name: Update PL Matches
on:
  schedule:
    - cron: '30 09 * * 2'
  workflow_dispatch:

permissions:
  contents: write

env:
  TARGET_BRANCH: auto/pl-matches   # <-- set it here

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, ref: main }

      - uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Install system dependencies for chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2

      - run: |
          echo "Installing dependencies without upgrading pip..."
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt
          fi
          
      - name: Install Playwright browsers
        run: playwright install chromium
        
      - run: python auto_update_match_df.py

      - id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Automated update (PL matches)"
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Push to target branch (create if missing)
        if: steps.commit.outputs.changed == 'true'
        env:
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Target branch: ${TARGET_BRANCH}"
          git check-ref-format --branch "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}"
          git push -u origin "${TARGET_BRANCH}" --force-with-lease
